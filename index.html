/* ── SIDEBAR HELPERS ───────────────────────────────────── */
function buildNav(items) {
    sideNavbar.innerHTML = "";
    items.forEach(({ icon, label, onClick, active }) => {
        const a = document.createElement("a");
        a.href = "#";
        a.innerHTML = `<span class="icon">${icon}</span><span>${label}</span>`;
        if (active) a.classList.add("active");
        a.addEventListener("click", e => {
            e.preventDefault();
            sideNavbar.querySelectorAll("a").forEach(l => l.classList.remove("active"));
            a.classList.add("active");
            onClick();
        });
        sideNavbar.appendChild(a);
    });
}

    { icon:"📉", label:"FM",          onClick:() => loadSubject("FM")        },
    { icon:"🧠", label:"SM",          onClick:() => loadSubject("SM")        },
];

function loadSubject(name) {
    const data = libraryMap[name] || { notes: [], videos: [] };

    let html = `
        <h2>${name}</h2>
        <p>Select a resource below to open in a new tab.</p>
    `;

    // Build Notes Section
    html += `<div class="card"><h3>📚 Notes</h3><div class="media-grid">`;
    if (data.notes.length > 0) {
        data.notes.forEach(note => {
            html += `
            <a href="${note.file}" target="_blank" class="media-card">
                <img src="${note.thumb}" alt="PDF Thumbnail" class="media-thumb" onerror="this.style.display='none'">
                <span class="media-title">${note.title}</span>
            </a>`;
        });
    } else {
        html += `<p style="grid-column: 1 / -1; color: #666;">No notes added yet.</p>`;
    }
    html += `</div></div>`;

    // Build Videos Section
    html += `<div class="card"><h3>🎥 Videos</h3><div class="media-grid">`;
    if (data.videos.length > 0) {
        data.videos.forEach(video => {
            html += `
            <a href="${video.file}" target="_blank" class="media-card">
                <img src="${video.thumb}" alt="Video Thumbnail" class="media-thumb" onerror="this.style.display='none'">
                <span class="media-title">${video.title}</span>
            </a>`;
        });
    } else {
        html += `<p style="grid-column: 1 / -1; color: #666;">No videos added yet.</p>`;
    }
    html += `</div></div>`;

    mainContent.innerHTML = html;
}

function enterLibraryMode() {
    const items = libraryItems.map((it, i) => ({ ...it, active: i === 0 }));
    buildNav(items);
    loadSubject("Accounts");
}

    { icon:"🗂️", label:"Previous Year QP", onClick:() => loadExam("PYQ") },

    { icon:"🏆", label:"Mega MTP", onClick:() => loadExam("MEGA_MTP") }
];

function loadExam(type) {
    const data = fileMap[type];
    const titles = { 
        MTP:"Mock Test Papers", 
        RTP:"Revision Test Papers", 
        PYQ:"Previous Year Question Papers",
        CASE_STUDY: "Case Study Books",
        MEGA_MTP: "Mega Mock Test Papers"
    };
    let html = `<h2>${titles[type]}</h2><p>Download papers and official answers as PDF.</p>`;

    for (const group in data) {
        html += `<div class="card"><h3>📅 ${group}</h3><ul class="paper-list">`;
        data[group].forEach(item => {
            html += `
                <li>
                    <span class="year">${item.name}</span>
                    <div>
                        ${item.qFile ? `<a class="paper-btn" href="${item.qFile}" target="_blank">📄 Question Paper</a>` : ''}
                        ${item.aFile ? `<a class="paper-btn" href="${item.aFile}" target="_blank">✅ Answers</a>` : ''}
                        ${item.file ? `<a class="paper-btn" href="${item.file}" target="_blank">📄 Document</a>` : ''}
                        ${item.fileAlt ? `<a class="paper-btn" href="${item.fileAlt}" target="_blank">📄 Decrypted/Alt</a>` : ''}
                    </div>
                </li>`;
        });
        html += `</ul></div>`;
    }
    mainContent.innerHTML = html;
}

function enterExamMode() {
    const items = examItems.map((it, i) => ({ ...it, active: i === 0 }));
    buildNav(items);
    loadExam("MTP");
}

/* ── SEARCH BAR LOGIC ──────────────────────────────────── */
const searchForm = document.getElementById("searchForm");
const searchInput = document.getElementById("searchInput");
const searchEngine = document.getElementById("searchEngine");

searchForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const query = encodeURIComponent(searchInput.value.trim());
    if (!query) return;

    let url = "";
    const engine = searchEngine.value;

    if (engine === "google") {
        url = `https://www.google.com/search?q=${query}`;
    } else if (engine === "youtube") {
        url = `https://www.youtube.com/results?search_query=${query}`;
    } else if (engine === "chatgpt") {
        // Directs to ChatGPT search
        url = `https://chatgpt.com/?q=${query}`;
    } else if (engine === "claude") {
        // Directs to Claude (standard entry point)
        url = `https://claude.ai/chat`;
    } else if (engine === "gemini") {
        // Directs to Gemini with query
        url = `https://gemini.google.com/app?q=${query}`;
    }

    if (url) {
        window.open(url, "_blank");
    }
});

/* ── MODE TOGGLE ───────────────────────────────────────── */
modeToggleBtn.addEventListener("click", () => {
    isExamMode = !isExamMode;
    document.body.classList.toggle("examhall", isExamMode);

    if (isExamMode) {
        logoIcon.textContent  = "🏛️";
        logoText.textContent  = "CA Exam Hall";
        modeBadge.textContent = "Exam Hall";
        enterExamMode();
    } else {
        logoIcon.textContent  = "📚";
        logoText.textContent  = "CA Library";
        modeBadge.textContent = "Library";
        enterLibraryMode();
    }
});

/* ── SIDEBAR COLLAPSE ──────────────────────────────────── */
document.getElementById("toggleBtn").addEventListener("click", () => {
    document.body.classList.toggle("collapsed");
});

/* ── BOOT ──────────────────────────────────────────────── */
enterLibraryMode();
</script>
